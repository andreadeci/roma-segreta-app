<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Roma Segreta">
  <meta name="theme-color" content="#B8860B">
  <title>Roma Segreta</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
  // ============================================================
  // Roma Segreta v5 — Complete Rewrite
  // ============================================================
  (function() {
    'use strict';

    // --- Config ---
    const SUPABASE_URL = 'https://pijuymqrqtzolmpypovc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpanV5bXFycXR6b2xtcHlwb3ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTgzNzIsImV4cCI6MjA5MTU5NDM3Mn0.bd0xDi_D7b5YtCXw05oWTdqQ9Vdf3OgGtLfawzEiO1w';
    const ADMIN_EMAIL = 'inforomasegreta@gmail.com';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    // --- Staff Config ---
    const STAFF_MAP = {
      maria: { name: 'Maria', role: 'Pulizie', rate: 15, type: 'hourly', conversation: 'andrea_maria' },
      sara:  { name: 'Sara',  role: 'Manutenzione / Check-in', rate: 10, type: 'per_job', conversation: 'andrea_sara' }
    };

    // --- Linen Rules (exact lookup tables) ---
    const LINEN = {
      boutique: {
        1: { federe: 2, lenzuola: 2, asciugamani: 1, tappeti: 1 },
        2: { federe: 2, lenzuola: 2, asciugamani: 2, tappeti: 1 },
        3: { federe: 4, lenzuola: 4, asciugamani: 3, tappeti: 1 },
        4: { federe: 4, lenzuola: 4, asciugamani: 4, tappeti: 1 }
      },
      design: {
        1: { federe: 2, lenzuola: 2, asciugamani: 1, tappeti: 2 },
        2: { federe: 2, lenzuola: 2, asciugamani: 2, tappeti: 2 },
        3: { federe: 4, lenzuola: 4, asciugamani: 3, tappeti: 2 },
        4: { federe: 4, lenzuola: 4, asciugamani: 4, tappeti: 2 }
      }
    };

    // v5 prices (restored originals)
    const PRICES = {
      lenzuola: 2.50,
      federe: 1.00,
      asciugamani: 3.00,  // set asciugamani
      tappeti: 1.50,
      copripiumini: 4.00
    };

    // --- State ---
    let currentUser = null;
    let userRole = null;
    let currentTab = 'dashboard';
    let staffSubTab = 'chat';     // 'chat', 'cassa', 'todo'
    let chatTarget = null;
    let propertiesMap = {};

    // --- Helpers ---
    const $ = (sel, ctx) => (ctx || document).querySelector(sel);
    const $$ = (sel, ctx) => [...(ctx || document).querySelectorAll(sel)];

    function toast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast' + (type ? ' ' + type : '');
      requestAnimationFrame(() => el.classList.add('visible'));
      setTimeout(() => el.classList.remove('visible'), 2500);
    }

    function formatDate(d) {
      if (!d) return '-';
      return new Date(d).toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
    }

    function formatDateTime(d) {
      if (!d) return '-';
      return new Date(d).toLocaleString('it-IT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function formatTime(d) {
      if (!d) return '-';
      return new Date(d).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    function formatEuro(n) {
      return '€' + Number(n || 0).toFixed(2).replace('.', ',');
    }

    function getMonday(d) {
      const dt = new Date(d);
      const day = dt.getDay();
      const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(dt.setDate(diff));
    }

    function getSunday(d) {
      const mon = getMonday(d);
      return new Date(mon.getTime() + 6 * 86400000);
    }

    function dateStr(d) { return d.toISOString().split('T')[0]; }

    function needsCopripiumino(checkinDate) {
      const d = new Date(checkinDate);
      const m = d.getMonth();
      const day = d.getDate();
      if (m >= 0 && m <= 2) return true;
      if (m >= 10) return true;
      if (m === 9 && day >= 11) return true;
      return false;
    }

    function getLinenForBooking(aptName, numGuests, checkinDate) {
      const key = aptName.toLowerCase();
      const table = LINEN[key];
      const g = Math.min(Math.max(numGuests || 1, 1), 4);
      const items = table ? { ...table[g] } : { federe: 0, lenzuola: 0, asciugamani: 0, tappeti: 0 };
      items.copripiumini = needsCopripiumino(checkinDate) ? (items.lenzuola / 2) : 0;
      return items;
    }

    function getWeekLabel(mon, sun) {
      const mStr = mon.toLocaleDateString('it-IT', { day: 'numeric' });
      const sStr = sun.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
      return mStr + '-' + sStr.charAt(0).toUpperCase() + sStr.slice(1);
    }

    function dedup(bookings) {
      return [...new Map((bookings || []).map(b => [b.lodgify_booking_id || b.id, b])).values()];
    }

    // --- Supabase Helpers ---
    async function getProperties() {
      const { data } = await sb.from('properties').select('id, name');
      propertiesMap = {};
      (data || []).forEach(p => { propertiesMap[p.id] = p.name; });
      return propertiesMap;
    }

    function getAptName(propertyId) {
      const name = propertiesMap[propertyId] || '';
      if (name.toLowerCase().includes('design')) return 'Design';
      if (name.toLowerCase().includes('boutique')) return 'Boutique';
      return name || 'Sconosciuto';
    }

    // --- Auth ---
    async function checkSession() {
      const { data: { session } } = await sb.auth.getSession();
      if (session?.user) {
        currentUser = session.user;
        determineRole();
        return true;
      }
      return false;
    }

    function determineRole() {
      if (!currentUser) { userRole = null; return; }
      const email = currentUser.email?.toLowerCase() || '';
      if (email === ADMIN_EMAIL) userRole = 'admin';
      else if (email.includes('maria')) userRole = 'maria';
      else if (email.includes('sara')) userRole = 'sara';
      else userRole = 'admin';
    }

    async function login(email, password) {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      currentUser = data.user;
      determineRole();
    }

    async function logout() {
      await sb.auth.signOut();
      currentUser = null;
      userRole = null;
      render();
    }

    // ============================================================
    // RENDERING
    // ============================================================
    function render() {
      const app = document.getElementById('app');
      if (!currentUser) {
        app.innerHTML = renderLogin();
        bindLogin();
      } else if (userRole === 'admin') {
        app.innerHTML = renderAdminShell();
        bindAdminShell();
        navigateTo(currentTab);
      } else {
        app.innerHTML = renderStaffShell();
        bindStaffView();
      }
    }

    // --- Login ---
    function renderLogin() {
      return `
        <div class="login-screen">
          <div class="login-card">
            <img src="icons/icon-192.png" class="login-logo" alt="Roma Segreta">
            <div class="login-title">Roma Segreta</div>
            <div class="login-subtitle">Gestione Staff</div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="login-email" class="form-input" placeholder="tua@email.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button id="login-btn" class="btn-primary">Accedi</button>
            <div id="login-error" class="login-error"></div>
          </div>
        </div>`;
    }

    function bindLogin() {
      const btn = $('#login-btn');
      const errEl = $('#login-error');
      btn.addEventListener('click', async () => {
        const email = $('#login-email').value.trim();
        const pwd = $('#login-password').value;
        if (!email || !pwd) { errEl.textContent = 'Inserisci email e password'; errEl.classList.add('visible'); return; }
        btn.disabled = true;
        btn.textContent = 'Accesso...';
        try {
          await login(email, pwd);
          render();
        } catch (e) {
          errEl.textContent = 'Credenziali non valide';
          errEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Accedi';
        }
      });
      $('#login-password').addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
    }

    // --- Admin Shell (4 tabs) ---
    function renderAdminShell() {
      return `
        <header class="app-header">
          <div class="logo">
            <img src="icons/icon-192.png" alt="">
            Roma Segreta
          </div>
          <div class="header-actions">
            <button class="header-btn" id="btn-sync" title="Sync Lodgify">🔄</button>
            <button class="header-btn" id="btn-logout" title="Esci">🚪</button>
          </div>
        </header>
        <div class="main-content" id="page-content"></div>
        <nav class="tab-bar">
          <button class="tab-item active" data-tab="dashboard">
            <span class="tab-icon">🏠</span>
            Dashboard
          </button>
          <button class="tab-item" data-tab="lavanderia">
            <span class="tab-icon">👕</span>
            Lavanderia
          </button>
          <button class="tab-item" data-tab="staff">
            <span class="tab-icon">👥</span>
            Staff
          </button>
          <button class="tab-item" data-tab="chat_gruppo">
            <span class="tab-icon">💬</span>
            Chat
          </button>
        </nav>`;
    }

    function bindAdminShell() {
      $$('.tab-item').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTab = btn.dataset.tab;
          $$('.tab-item').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          navigateTo(currentTab);
        });
      });

      $('#btn-logout').addEventListener('click', () => logout());
      $('#btn-sync').addEventListener('click', async () => {
        toast('Sincronizzazione in corso...');
        try {
          const { data: { session } } = await sb.auth.getSession();
          const res = await fetch(SUPABASE_URL + '/functions/v1/sync-lodgify', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + session.access_token }
          });
          if (!res.ok) throw new Error('Sync failed');
          toast('Sync completata!', 'success');
          if (currentTab === 'dashboard') navigateTo('dashboard');
        } catch (e) {
          toast('Errore sync: ' + (e.message || 'Riprova'), 'error');
        }
      });
    }

    async function navigateTo(tab) {
      const content = $('#page-content');
      if (!content) return;
      content.innerHTML = '<div class="loading">Caricamento...</div>';
      try {
        switch (tab) {
          case 'dashboard': await renderDashboard(content); break;
          case 'lavanderia': await renderLavanderia(content); break;
          case 'staff':
            if (chatTarget) { await renderPrivateChat(content); }
            else { await renderStaffPage(content); }
            break;
          case 'chat_gruppo': await renderGroupChat(content); break;
        }
      } catch (err) {
        console.error('Page error:', err);
        content.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Errore nel caricamento</div></div>';
      }
    }

    // ============================================================
    // DASHBOARD (ADMIN)
    // ============================================================
    async function renderDashboard(container) {
      await getProperties();
      const now = new Date();
      const monday = getMonday(now);
      const sunday = getSunday(now);
      const monStr = dateStr(monday);
      const sunStr = dateStr(sunday);

      const { data: rawBookings } = await sb.from('bookings').select('*')
        .or(`checkin_date.gte.${monStr},checkout_date.lte.${sunStr}`)
        .order('checkin_date');

      const allBookings = dedup(rawBookings);
      const arrivals = allBookings.filter(b => b.checkin_date >= monStr && b.checkin_date <= sunStr);
      const departures = allBookings.filter(b => b.checkout_date >= monStr && b.checkout_date <= sunStr);

      const totalNights = 7 * 2;
      let occupiedNights = 0;
      allBookings.forEach(b => {
        const ci = new Date(Math.max(new Date(b.checkin_date), monday));
        const co = new Date(Math.min(new Date(b.checkout_date), new Date(sunday.getTime() + 86400000)));
        occupiedNights += Math.max(0, Math.round((co - ci) / 86400000));
      });
      occupiedNights = Math.min(occupiedNights, totalNights);
      const occupancy = totalNights > 0 ? Math.round((occupiedNights / totalNights) * 100) : 0;

      // Laundry summary
      const laundryDesign = { federe: 0, lenzuola: 0, asciugamani: 0, tappeti: 0, copripiumini: 0, checkins: 0, guests: 0 };
      const laundryBoutique = { federe: 0, lenzuola: 0, asciugamani: 0, tappeti: 0, copripiumini: 0, checkins: 0, guests: 0 };

      arrivals.forEach(b => {
        const aptName = getAptName(b.property_id);
        const items = getLinenForBooking(aptName, b.num_guests, b.checkin_date);
        const target = aptName === 'Design' ? laundryDesign : laundryBoutique;
        target.federe += items.federe;
        target.lenzuola += items.lenzuola;
        target.asciugamani += items.asciugamani;
        target.tappeti += items.tappeti;
        target.copripiumini += items.copripiumini;
        target.checkins++;
        target.guests += (b.num_guests || 1);
      });

      // Staff payments
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const monthStartStr = dateStr(monthStart);
      const { data: shifts } = await sb.from('work_shifts').select('*').gte('clock_in', monthStartStr);
      const { data: interventions } = await sb.from('work_interventions').select('*').gte('created_at', monthStartStr);
      const allShifts = shifts || [];
      const allInterventions = interventions || [];
      const weekShifts = allShifts.filter(s => s.clock_in >= monStr);
      const weekInterventions = allInterventions.filter(i => i.created_at >= monStr);
      const mariaWeekHrs = weekShifts.filter(s => s.worker === 'Maria').reduce((sum, s) => sum + (s.duration_minutes || 0), 0) / 60;
      const mariaMonthHrs = allShifts.filter(s => s.worker === 'Maria').reduce((sum, s) => sum + (s.duration_minutes || 0), 0) / 60;
      const saraWeekInt = weekInterventions.filter(i => i.worker === 'Sara').length;
      const saraMonthInt = allInterventions.filter(i => i.worker === 'Sara').length;

      // Open todos
      const { count: openTodos } = await sb.from('staff_todos')
        .select('id', { count: 'exact', head: true })
        .eq('is_completed', false).eq('is_archived', false);

      container.innerHTML = `
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-icon arrivals">↓</div>
            <div class="kpi-value">${arrivals.length}</div>
            <div class="kpi-label">Arrivi</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon departures">↑</div>
            <div class="kpi-value">${departures.length}</div>
            <div class="kpi-label">Partenze</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon nights">☽</div>
            <div class="kpi-value">${occupiedNights}<small>/${totalNights}</small></div>
            <div class="kpi-label">Notti occupate</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon occupancy">%</div>
            <div class="kpi-value">${occupancy}%</div>
            <div class="kpi-label">Occupazione</div>
          </div>
        </div>

        <div class="card card-expandable" id="card-arrivals">
          <div class="card-header">
            <div class="card-title"><span class="icon">📥</span> Prossimi arrivi</div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="card-badge" style="background:var(--success)">${arrivals.length}</span>
              <span class="card-expand-arrow">▼</span>
            </div>
          </div>
          <div class="card-expand-content">
            ${arrivals.length === 0 ? '<div class="empty-state"><div class="empty-text">Nessun arrivo questa settimana</div></div>' :
              arrivals.map(b => `
                <div class="guest-item">
                  <div>
                    <div class="guest-name">${b.guest_name || 'Ospite'}</div>
                    <div class="guest-meta">${formatDate(b.checkin_date)} · ${b.num_guests || 1} ospiti</div>
                  </div>
                  <span class="apt-badge ${getAptName(b.property_id).toLowerCase()}">${getAptName(b.property_id)}</span>
                </div>`).join('')}
          </div>
        </div>

        <div class="card card-expandable" id="card-departures">
          <div class="card-header">
            <div class="card-title"><span class="icon">📤</span> Prossime partenze</div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="card-badge" style="background:var(--error)">${departures.length}</span>
              <span class="card-expand-arrow">▼</span>
            </div>
          </div>
          <div class="card-expand-content">
            ${departures.length === 0 ? '<div class="empty-state"><div class="empty-text">Nessuna partenza questa settimana</div></div>' :
              departures.map(b => `
                <div class="guest-item">
                  <div>
                    <div class="guest-name">${b.guest_name || 'Ospite'}</div>
                    <div class="guest-meta">${formatDate(b.checkout_date)} · ${b.num_guests || 1} ospiti</div>
                  </div>
                  <span class="apt-badge ${getAptName(b.property_id).toLowerCase()}">${getAptName(b.property_id)}</span>
                </div>`).join('')}
          </div>
        </div>

        ${renderLaundrySummaryCard(laundryDesign, laundryBoutique)}

        <div class="card">
          <div class="card-header">
            <div class="card-title"><span class="icon">💰</span> Pagamenti staff</div>
          </div>
          <div class="payment-row">
            <div>
              <div class="fw-700">Maria</div>
              <div class="payment-detail">Sett: ${mariaWeekHrs.toFixed(1)}h · Mese: ${mariaMonthHrs.toFixed(1)}h</div>
            </div>
            <div class="payment-amount">${formatEuro(mariaMonthHrs * 15)}</div>
          </div>
          <div class="payment-row">
            <div>
              <div class="fw-700">Sara</div>
              <div class="payment-detail">Sett: ${saraWeekInt} int. · Mese: ${saraMonthInt} int.</div>
            </div>
            <div class="payment-amount">${formatEuro(saraMonthInt * 10)}</div>
          </div>
          <div class="payment-row total">
            <span>Totale mese</span>
            <span class="payment-amount">${formatEuro(mariaMonthHrs * 15 + saraMonthInt * 10)}</span>
          </div>
        </div>

        <div class="card" style="cursor:pointer" id="card-todos-shortcut">
          <div class="card-header" style="margin-bottom:0">
            <div class="card-title"><span class="icon">📋</span> Compiti aperti</div>
            <span class="card-badge">${openTodos || 0}</span>
          </div>
        </div>
      `;

      $$('.card-expandable').forEach(card => {
        card.addEventListener('click', () => card.classList.toggle('expanded'));
      });

      $('#card-todos-shortcut')?.addEventListener('click', () => {
        staffSubTab = 'todo';
        chatTarget = null;
        currentTab = 'staff';
        $$('.tab-item').forEach(b => b.classList.toggle('active', b.dataset.tab === 'staff'));
        navigateTo('staff');
      });
    }

    function renderLaundrySummaryCard(laundryDesign, laundryBoutique) {
      return `
        <div class="card">
          <div class="card-header">
            <div class="card-title"><span class="icon">📦</span> Lavanderia settimana</div>
          </div>
          ${renderLaundrySummaryBlock('Design', laundryDesign, 'design')}
          ${renderLaundrySummaryBlock('Boutique', laundryBoutique, 'boutique')}
        </div>`;
    }

    function renderLaundrySummaryBlock(name, data, cls) {
      const items = [];
      if (data.federe > 0) items.push({ label: 'Federe', val: data.federe });
      if (data.lenzuola > 0) items.push({ label: 'Lenzuola', val: data.lenzuola });
      if (data.asciugamani > 0) items.push({ label: 'Asciugamani', val: data.asciugamani });
      if (data.tappeti > 0) items.push({ label: 'Tappeti', val: data.tappeti });
      if (data.copripiumini > 0) items.push({ label: 'Copripiumini', val: data.copripiumini });

      if (items.length === 0) {
        return `<div class="laundry-apt-block">
          <div class="laundry-apt-header">
            <span class="apt-badge ${cls}">${name}</span>
            <span class="laundry-apt-meta">(0 check-in)</span>
          </div>
        </div>`;
      }

      return `
        <div class="laundry-apt-block">
          <div class="laundry-apt-header">
            <span class="apt-badge ${cls}">${name}</span>
            <span class="laundry-apt-meta">(${data.checkins} check-in, ${data.guests} ospiti)</span>
          </div>
          <div class="laundry-items">
            ${items.map(i => `<div class="laundry-item"><span class="laundry-item-label">${i.label}</span><span class="laundry-item-value">${i.val}</span></div>`).join('')}
          </div>
        </div>`;
    }

    // ============================================================
    // LAVANDERIA (ADMIN)
    // ============================================================
    async function renderLavanderia(container) {
      await getProperties();
      const now = new Date();
      const monday = getMonday(now);
      const sunday = getSunday(now);
      const monStr = dateStr(monday);
      const sunStr = dateStr(sunday);

      const { data: rawBookings } = await sb.from('bookings').select('*')
        .gte('checkin_date', monStr).lte('checkin_date', sunStr).order('checkin_date');

      const arrivals = dedup(rawBookings);

      if (arrivals.length === 0) {
        container.innerHTML = `
          <div class="page-title">Lavanderia</div>
          <div class="empty-state">
            <div class="empty-icon">🧺</div>
            <div class="empty-text">Nessun check-in questa settimana.<br>Verifica la sincronizzazione Lodgify.</div>
          </div>`;
        return;
      }

      const rows = arrivals.map((b, i) => {
        const apt = getAptName(b.property_id);
        const items = getLinenForBooking(apt, b.num_guests, b.checkin_date);
        return { ...b, apt, items, idx: i + 1 };
      });

      // Build table rows, hiding zero-qty columns

                </tr>

              ${totAll.federe > 0 ? `<tr><td>Federe</td><td class="text-center">${totAll.federe}</td><td class="text-right">${formatEuro(PRICES.federe)}</td><td class="text-right">${formatEuro(totAll.federe * PRICES.federe)}</td></tr>` : ''}
              ${totAll.asciugamani > 0 ? `<tr><td>Set asciugamani</td><td class="text-center">${totAll.asciugamani}</td><td class="text-right">${formatEuro(PRICES.asciugamani)}</td><td class="text-right">${formatEuro(totAll.asciugamani * PRICES.asciugamani)}</td></tr>` : ''}
              ${totAll.tappeti > 0 ? `<tr><td>Tappeti doccia</td><td class="text-center">${totAll.tappeti}</td><td class="text-right">${formatEuro(PRICES.tappeti)}</td><td class="text-right">${formatEuro(totAll.tappeti * PRICES.tappeti)}</td></tr>` : ''}
              ${totAll.copripiumini > 0 ? `<tr><td>Copripiumini</td><td class="text-center">${totAll.copripiumini}</td><td class="text-right">${formatEuro(PRICES.copripiumini)}</td><td class="text-right">${formatEuro(totAll.copripiumini * PRICES.copripiumini)}</td></tr>` : ''}

    async function renderStaffPage(container) {
      container.innerHTML = `
        <div class="page-title">Staff</div>
        <div class="staff-tabs">
          <button class="staff-tab ${staffSubTab === 'chat' ? 'active' : ''}" data-sub="chat">💬 Chat private</button>
          <button class="staff-tab ${staffSubTab === 'cassa' ? 'active' : ''}" data-sub="cassa">💶 Cassa</button>

        </div>

      $$('.staff-tab').forEach(btn => {

          renderStaffSubContent();
        });
      });

    async function renderStaffSubContent() {
      const sub = $('#staff-sub-content');
      if (!sub) return;
      sub.innerHTML = '<div class="loading">Caricamento...</div>';
      try {
        switch (staffSubTab) {
          case 'chat': await renderStaffChatList(sub); break;
          case 'cassa': await renderCassa(sub); break;
          case 'todo': await renderTodos(sub); break;
        }
      } catch (err) {
        console.error('Staff sub error:', err);
        sub.innerHTML = '<div class="empty-state"><div class="empty-text">Errore</div></div>';
      }
    }

    // --- Staff Chat List ---
    async function renderStaffChatList(container) {
      const staffKeys = ['maria', 'sara'];
      const staffData = [];
      for (const key of staffKeys) {
        const info = STAFF_MAP[key];
        const { data: lastMsg } = await sb.from('staff_messages').select('message, created_at')
          .eq('conversation', info.conversation).order('created_at', { ascending: false }).limit(1);
        const { count: unread } = await sb.from('staff_messages')
          .select('id', { count: 'exact', head: true })
          .eq('conversation', info.conversation).eq('is_read', false).neq('sender', 'andrea');
        staffData.push({
          key, info,
          lastMessage: lastMsg?.[0]?.message || '',
          lastTime: lastMsg?.[0]?.created_at || '',
          unread: unread || 0
        });
      }

      container.innerHTML = staffData.map(s => `
        <div class="staff-card" data-staff="${s.key}">
          <div class="staff-avatar ${s.key}">${s.info.name.charAt(0)}</div>
          <div class="staff-info">
            <div class="staff-name">${s.info.name}</div>
            <div class="staff-role">${s.info.role}</div>
            ${s.lastMessage ? `<div class="staff-last-msg">${s.lastMessage}</div>` : ''}
          </div>
          <div class="staff-card-right">
            ${s.lastTime ? `<div class="staff-card-time">${formatTime(s.lastTime)}</div>` : ''}
            ${s.unread > 0 ? `<span class="card-badge">${s.unread}</span>` : ''}
            <span class="staff-card-chevron">›</span>
          </div>
        </div>
      `).join('');

      $$('.staff-card').forEach(card => {
        card.addEventListener('click', () => {
          chatTarget = card.dataset.staff;
          navigateTo('staff');
        });
      });
    }

    // --- Private Chat (Admin → Staff) ---
    async function renderPrivateChat(container) {
      const info = STAFF_MAP[chatTarget];
      if (!info) { chatTarget = null; navigateTo('staff'); return; }

      await sb.from('staff_messages').update({ is_read: true })
        .eq('conversation', info.conversation).eq('is_read', false).neq('sender', 'andrea');

      const { data: messages } = await sb.from('staff_messages').select('*')
        .eq('conversation', info.conversation).order('created_at', { ascending: true }).limit(200);

      const msgs = messages || [];

      container.innerHTML = `
        <div class="chat-container">
          <div class="chat-header">
            <button class="chat-back-btn" id="chat-back">‹</button>
            <div class="staff-avatar ${chatTarget} sm">${info.name.charAt(0)}</div>
            <div>
              <div class="fw-700">${info.name}</div>
              <div style="font-size:12px;color:var(--text-secondary)">${info.role}</div>
            </div>
          </div>
          <div class="chat-messages" id="chat-messages">
            ${msgs.length === 0 ? '<div class="chat-empty">Nessun messaggio. Inizia la conversazione.</div>' :
              msgs.map(m => renderChatBubble(m, 'admin')).join('')}
          </div>
          <div class="chat-input-bar">
            <input type="text" class="chat-input" id="chat-input" placeholder="Scrivi un messaggio..." autocomplete="off">
            <button class="chat-send-btn" id="chat-send">➤</button>
          </div>
        </div>
      `;

      const msgContainer = $('#chat-messages');
      msgContainer.scrollTop = msgContainer.scrollHeight;

      $('#chat-back').addEventListener('click', () => { chatTarget = null; navigateTo('staff'); });

      const sendMsg = async () => {
        const input = $('#chat-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        const isTask = text.toUpperCase().startsWith('COMPITO:');
        await sb.from('staff_messages').insert({
          conversation: info.conversation, sender: 'andrea',
          message: text, is_task: isTask, is_read: false
        });
        await renderPrivateChat(container);
      };

      $('#chat-send').addEventListener('click', sendMsg);
      $('#chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

      // Task completion
      $$('[data-task-id]').forEach(el => {
        el.addEventListener('click', async () => {
          await sb.from('staff_messages').update({
            task_completed: true, task_completed_at: new Date().toISOString()
          }).eq('id', el.dataset.taskId);
          toast('Compito completato!', 'success');
          await renderPrivateChat(container);
        });
      });
    }

    function renderChatBubble(msg, viewerRole) {
      const isSent = (viewerRole === 'admin' && msg.sender === 'andrea') ||
                     (viewerRole !== 'admin' && msg.sender !== 'andrea');
      const cls = isSent ? 'sent' : 'received';

      if (msg.is_task) {
        const done = msg.task_completed;
        return `
          <div class="chat-bubble task ${done ? 'completed' : ''}" ${isSent ? 'style="align-self:flex-end"' : ''}>
            <span class="task-prefix">📋 Compito</span>
            ${msg.message.replace(/^COMPITO:\s*/i, '')}
            <div class="task-check ${done ? 'done' : ''}" data-task-id="${msg.id}">
              ${done ? '☑ Completato' : '☐ Da fare'}
            </div>
            <div class="chat-time">${formatTime(msg.created_at)}</div>
          </div>`;
      }

      return `
        <div class="chat-bubble ${cls}">
          ${msg.message}
          <div class="chat-time">${formatTime(msg.created_at)}</div>
        </div>`;
    }

    // --- To-do List ---
    async function renderTodos(container) {
      const { data: todos } = await sb.from('staff_todos').select('*')
        .eq('is_archived', false).order('is_completed', { ascending: true }).order('created_at', { ascending: false });

      const items = todos || [];
      const pending = items.filter(t => !t.is_completed);
      const completed = items.filter(t => t.is_completed);

      container.innerHTML = `
        ${pending.length === 0 && completed.length === 0 ? '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nessun compito. Aggiungine uno!</div></div>' : ''}

        ${pending.length > 0 ? pending.map(t => renderTodoItem(t)).join('') : ''}

        ${completed.length > 0 ? `
          <div class="section-title" style="margin-top:16px;font-size:14px;color:var(--text-muted)">Completati</div>
          ${completed.map(t => renderTodoItem(t)).join('')}
        ` : ''}

        <button class="btn-primary mt-16" id="btn-add-todo">+ Nuovo compito</button>
      `;

      // Bind checkboxes
      $$('.todo-checkbox').forEach(el => {
        el.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = el.dataset.id;
          const isCompleted = el.classList.contains('checked');
          await sb.from('staff_todos').update({
            is_completed: !isCompleted,
            completed_at: !isCompleted ? new Date().toISOString() : null
          }).eq('id', id);
          await renderStaffSubContent();
        });
      });

      // Bind swipe-to-archive
      $$('.todo-item').forEach(item => {
        let startX = 0;
        let currentX = 0;
        const content = item.querySelector('.todo-item-content');

        item.addEventListener('touchstart', (e) => {
          startX = e.touches[0].clientX;
        }, { passive: true });

        item.addEventListener('touchmove', (e) => {
          currentX = e.touches[0].clientX;
          const diff = startX - currentX;
          if (diff > 20) {
            content.style.transform = `translateX(${Math.max(-80, -diff)}px)`;
          }
        }, { passive: true });

        item.addEventListener('touchend', () => {
          const diff = startX - currentX;
          if (diff > 60) {
            item.classList.add('swiped');
          } else {
            content.style.transform = '';
          }
        });
      });

      // Bind archive buttons
      $$('.todo-item-archive').forEach(btn => {
        btn.addEventListener('click', async () => {
          await sb.from('staff_todos').update({
            is_archived: true, archived_at: new Date().toISOString()
          }).eq('id', btn.dataset.id);
          toast('Archiviato', 'success');
          await renderStaffSubContent();
        });
      });

      // Add new
      $('#btn-add-todo')?.addEventListener('click', () => showAddTodoModal(container));
    }

      `;
      document.body.appendChild(overlay);

      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      $('#btn-cancel-todo').addEventListener('click', () => overlay.remove());
      $('#btn-save-todo').addEventListener('click', async () => {
        const title = $('#todo-title').value.trim();
        if (!title) { toast('Inserisci il compito', 'error'); return; }
        const assignedTo = $('#todo-assign').value || null;
        const dueDate = $('#todo-due').value || null;
        await sb.from('staff_todos').insert({
          title, assigned_to: assignedTo, due_date: dueDate, created_by: 'andrea'
        });
        overlay.remove();
        toast('Compito aggiunto!', 'success');
        await renderStaffSubContent();
      });
    }

    // ============================================================
    // GROUP CHAT (ADMIN)
    // ============================================================
    async function renderGroupChat(container) {
      const { data: messages } = await sb.from('chat_messages').select('*')
        .order('created_at', { ascending: true }).limit(200);

      const msgs = messages || [];

      container.innerHTML = `
        <div class="chat-container">
          <div class="chat-header" style="border-bottom:1px solid var(--border);padding:12px 0;margin-bottom:0;">
            <div style="font-size:18px">💬</div>
            <div>
              <div class="fw-700">Chat di gruppo</div>
              <div style="font-size:12px;color:var(--text-secondary)">Andrea, Maria, Sara</div>
            </div>
          </div>
          <div class="chat-messages" id="group-chat-messages">
            ${msgs.length === 0 ? '<div class="chat-empty">Nessun messaggio. Inizia la conversazione.</div>' :
              msgs.map(m => renderGroupBubble(m, 'andrea')).join('')}
          </div>
          <div class="chat-input-bar">
            <input type="text" class="chat-input" id="group-chat-input" placeholder="Scrivi al gruppo..." autocomplete="off">
            <button class="chat-send-btn" id="group-chat-send">➤</button>
          </div>
        </div>
      `;

      const msgContainer = $('#group-chat-messages');
      msgContainer.scrollTop = msgContainer.scrollHeight;

      const sendMsg = async () => {
        const input = $('#group-chat-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        await sb.from('chat_messages').insert({
          sender: 'andrea', sender_name: 'Andrea', message: text
        });
        await renderGroupChat(container);
      };

      $('#group-chat-send').addEventListener('click', sendMsg);
      $('#group-chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
    }

    function renderGroupBubble(msg, viewerRole) {
      const isSent = msg.sender === viewerRole;
      const cls = isSent ? 'sent' : 'received';

      if (isSent) {
        return `
          <div class="chat-bubble ${cls}">
            ${msg.message}
            <div class="chat-time">${formatTime(msg.created_at)}</div>
          </div>`;
      }

      return `
        <div class="chat-bubble ${cls}">
          <div class="chat-sender-label ${msg.sender}">${msg.sender_name}</div>
          ${msg.message}
          <div class="chat-time">${formatTime(msg.created_at)}</div>
        </div>`;
    }

    // ============================================================
    // STAFF VIEW (Maria / Sara)
    // ============================================================
    function renderStaffShell() {
      return `
        <header class="app-header">
          <div class="logo">
            <img src="icons/icon-192.png" alt="">
            Roma Segreta
          </div>
          <div class="header-actions">
            <button class="header-btn" id="btn-staff-logout" title="Esci">🚪</button>
          </div>
        </header>
        <div class="main-content" id="staff-content" style="padding-bottom:16px;"></div>
      `;
    }

    async function bindStaffView() {
      const container = $('#staff-content');
      if (!container) return;

      $('#btn-staff-logout')?.addEventListener('click', () => logout());

      const info = STAFF_MAP[userRole];
      if (!info) { container.innerHTML = '<div class="empty-state">Ruolo non riconosciuto</div>'; return; }

      if (userRole === 'maria') {
        await renderMariaView(container, info);
      } else if (userRole === 'sara') {
        await renderSaraView(container, info);
      }
    }

    async function renderMariaView(container, info) {
      const { data: openShift } = await sb.from('work_shifts').select('*')
        .eq('worker', 'Maria').is('clock_out', null).order('clock_in', { ascending: false }).limit(1);

      const hasOpenShift = openShift && openShift.length > 0;
      const currentShift = hasOpenShift ? openShift[0] : null;

      const { data: recentShifts } = await sb.from('work_shifts').select('*')
        .eq('worker', 'Maria').not('clock_out', 'is', null).order('clock_in', { ascending: false }).limit(10);

      // Todos assigned to maria
      const { data: myTodos } = await sb.from('staff_todos').select('*')
        .eq('is_archived', false).eq('is_completed', false)
        .or('assigned_to.eq.maria,assigned_to.is.null')
        .order('created_at', { ascending: false });

      // Messages
      const { data: messages } = await sb.from('staff_messages').select('*')
        .eq('conversation', info.conversation).order('created_at', { ascending: true }).limit(100);

      // Group chat recent
      const { data: groupMsgs } = await sb.from('chat_messages').select('*')
        .order('created_at', { ascending: true }).limit(50);

      container.innerHTML = `
        <div class="page-title">Ciao Maria 👋</div>

        ${hasOpenShift ? `
          <div class="card" style="background:#FFF3F3;border-color:#F5C6C6">
            <div style="font-size:13px;color:var(--text-secondary)">Turno in corso da</div>
            <div style="font-size:20px;font-weight:800">${formatTime(currentShift.clock_in)}</div>
          </div>
          <button class="clock-btn clock-out" id="btn-clock-out">🔴 USCITA</button>
        ` : `
          <button class="clock-btn clock-in" id="btn-clock-in">🟢 ENTRATA</button>
        `}

        ${myTodos && myTodos.length > 0 ? `
          <div class="section-title">Da fare</div>
          ${myTodos.map(t => `
            <div class="card" style="border-left:3px solid var(--primary)">
              <div style="font-size:14px">${t.title}</div>
              <button class="btn-copy mt-8" style="font-size:12px;padding:8px 14px;" data-todo-done="${t.id}">✓ Fatto</button>
            </div>
          `).join('')}
        ` : ''}

        <div class="section-title">Turni recenti</div>
        ${!recentShifts || recentShifts.length === 0 ? '<div class="empty-state"><div class="empty-text">Nessun turno registrato</div></div>' :
          recentShifts.map(s => `
            <div class="shift-item">
              <div><div class="shift-time">${formatDateTime(s.clock_in)} → ${formatTime(s.clock_out)}</div></div>
              <div style="text-align:right">
                <div class="shift-duration">${s.duration_minutes ? Math.round(s.duration_minutes / 60 * 10) / 10 + 'h' : '-'}</div>
                <div class="shift-amount">${s.amount ? formatEuro(s.amount) : '-'}</div>
              </div>
            </div>
          `).join('')}

        <div class="section-title">Messaggi con Andrea</div>
        <div class="card" style="max-height:300px;overflow-y:auto" id="maria-chat">
          ${!messages || messages.length === 0 ? '<div class="chat-empty" style="padding:20px">Nessun messaggio</div>' :
            messages.map(m => renderChatBubble(m, 'maria')).join('')}
        </div>
        <div class="chat-input-bar">
          <input type="text" class="chat-input" id="staff-chat-input" placeholder="Scrivi ad Andrea..." autocomplete="off">
          <button class="chat-send-btn" id="staff-chat-send">➤</button>
        </div>

        <div class="section-title">Chat di gruppo</div>
        <div class="card" style="max-height:250px;overflow-y:auto" id="maria-group-chat">
          ${!groupMsgs || groupMsgs.length === 0 ? '<div class="chat-empty" style="padding:20px">Nessun messaggio</div>' :
            groupMsgs.map(m => renderGroupBubble(m, 'maria')).join('')}
        </div>
        <div class="chat-input-bar">
          <input type="text" class="chat-input" id="group-input" placeholder="Scrivi al gruppo..." autocomplete="off">
          <button class="chat-send-btn" id="group-send">➤</button>
        </div>
      `;

      // Scroll chats
      const chatEl = $('#maria-chat');
      if (chatEl) chatEl.scrollTop = chatEl.scrollHeight;
      const groupEl = $('#maria-group-chat');
      if (groupEl) groupEl.scrollTop = groupEl.scrollHeight;

      // Clock in
      $('#btn-clock-in')?.addEventListener('click', async () => {
        await sb.from('work_shifts').insert({ worker: 'Maria', clock_in: new Date().toISOString() });
        toast('Entrata registrata!', 'success');
        await renderMariaView(container, info);
      });

      // Clock out
      $('#btn-clock-out')?.addEventListener('click', async () => {
        if (!currentShift) return;
        const now = new Date();
        const clockIn = new Date(currentShift.clock_in);
        const mins = Math.round((now - clockIn) / 60000);
        const amount = (mins / 60) * 15;
        await sb.from('work_shifts').update({
          clock_out: now.toISOString(), duration_minutes: mins, amount: Math.round(amount * 100) / 100
        }).eq('id', currentShift.id);
        toast('Uscita registrata! ' + Math.round(mins / 60 * 10) / 10 + 'h', 'success');
        await renderMariaView(container, info);
      });

      // Complete todos
      $$('[data-todo-done]').forEach(btn => {
        btn.addEventListener('click', async () => {
          await sb.from('staff_todos').update({
            is_completed: true, completed_at: new Date().toISOString()
          }).eq('id', btn.dataset.todoDone);
          toast('Compito completato!', 'success');
          await renderMariaView(container, info);
        });
      });

      // Private chat send
      const sendStaffMsg = async () => {
        const input = $('#staff-chat-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        await sb.from('staff_messages').insert({
          conversation: info.conversation, sender: 'maria', message: text, is_read: false
        });
        await renderMariaView(container, info);
      };
      $('#staff-chat-send')?.addEventListener('click', sendStaffMsg);
      $('#staff-chat-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') sendStaffMsg(); });

      // Group chat send
      const sendGroupMsg = async () => {
        const input = $('#group-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        await sb.from('chat_messages').insert({
          sender: 'maria', sender_name: 'Maria', message: text
        });
        await renderMariaView(container, info);
      };
      $('#group-send')?.addEventListener('click', sendGroupMsg);
      $('#group-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') sendGroupMsg(); });
    }

    async function renderSaraView(container, info) {
      const { data: recentInt } = await sb.from('work_interventions').select('*')
        .eq('worker', 'Sara').order('created_at', { ascending: false }).limit(10);

      // Todos assigned to sara
      const { data: myTodos } = await sb.from('staff_todos').select('*')
        .eq('is_archived', false).eq('is_completed', false)
        .or('assigned_to.eq.sara,assigned_to.is.null')
        .order('created_at', { ascending: false });

      const { data: messages } = await sb.from('staff_messages').select('*')
        .eq('conversation', info.conversation).order('created_at', { ascending: true }).limit(100);

      const { data: groupMsgs } = await sb.from('chat_messages').select('*')
        .order('created_at', { ascending: true }).limit(50);

      container.innerHTML = `
        <div class="page-title">Ciao Sara 👋</div>

        <button class="clock-btn register-intervention" id="btn-register-int">🔧 REGISTRA INTERVENTO</button>
        <div id="int-note-wrap" class="hidden" style="margin-bottom:16px">
          <input type="text" class="form-input" id="int-note" placeholder="Nota opzionale..." style="margin-bottom:8px">
          <button class="btn-primary" id="btn-confirm-int">Conferma intervento</button>
        </div>

        ${myTodos && myTodos.length > 0 ? `
          <div class="section-title">Da fare</div>
          ${myTodos.map(t => `
            <div class="card" style="border-left:3px solid var(--primary)">
              <div style="font-size:14px">${t.title}</div>
              <button class="btn-copy mt-8" style="font-size:12px;padding:8px 14px;" data-todo-done="${t.id}">✓ Fatto</button>
            </div>
          `).join('')}
        ` : ''}

        <div class="section-title">Interventi recenti</div>
        ${!recentInt || recentInt.length === 0 ? '<div class="empty-state"><div class="empty-text">Nessun intervento registrato</div></div>' :
          recentInt.map(i => `
            <div class="intervention-item">
              <div>
                <div class="intervention-time">${formatDateTime(i.created_at)}</div>
                ${i.note ? `<div style="font-size:13px;margin-top:2px">${i.note}</div>` : ''}
              </div>
              <div class="intervention-amount">${formatEuro(i.amount)}</div>
            </div>
          `).join('')}

        <div class="section-title">Messaggi con Andrea</div>
        <div class="card" style="max-height:300px;overflow-y:auto" id="sara-chat">
          ${!messages || messages.length === 0 ? '<div class="chat-empty" style="padding:20px">Nessun messaggio</div>' :
            messages.map(m => renderChatBubble(m, 'sara')).join('')}
        </div>
        <div class="chat-input-bar">
          <input type="text" class="chat-input" id="staff-chat-input" placeholder="Scrivi ad Andrea..." autocomplete="off">
          <button class="chat-send-btn" id="staff-chat-send">➤</button>
        </div>

        <div class="section-title">Chat di gruppo</div>
        <div class="card" style="max-height:250px;overflow-y:auto" id="sara-group-chat">
          ${!groupMsgs || groupMsgs.length === 0 ? '<div class="chat-empty" style="padding:20px">Nessun messaggio</div>' :
            groupMsgs.map(m => renderGroupBubble(m, 'sara')).join('')}
        </div>
        <div class="chat-input-bar">
          <input type="text" class="chat-input" id="group-input" placeholder="Scrivi al gruppo..." autocomplete="off">
          <button class="chat-send-btn" id="group-send">➤</button>
        </div>
      `;

      // Scroll chats
      const chatEl = $('#sara-chat');
      if (chatEl) chatEl.scrollTop = chatEl.scrollHeight;
      const groupEl = $('#sara-group-chat');
      if (groupEl) groupEl.scrollTop = groupEl.scrollHeight;

      // Register intervention
      $('#btn-register-int').addEventListener('click', () => {
        $('#int-note-wrap').classList.toggle('hidden');
      });

      $('#btn-confirm-int')?.addEventListener('click', async () => {
        const note = $('#int-note')?.value.trim() || null;
        await sb.from('work_interventions').insert({ worker: 'Sara', note, amount: 10.00 });
        toast('Intervento registrato! €10,00', 'success');
        await renderSaraView(container, info);
      });

      // Complete todos
      $$('[data-todo-done]').forEach(btn => {
        btn.addEventListener('click', async () => {
          await sb.from('staff_todos').update({
            is_completed: true, completed_at: new Date().toISOString()
          }).eq('id', btn.dataset.todoDone);
          toast('Compito completato!', 'success');
          await renderSaraView(container, info);
        });
      });

      // Private chat
      const sendStaffMsg = async () => {
        const input = $('#staff-chat-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        await sb.from('staff_messages').insert({
          conversation: info.conversation, sender: 'sara', message: text, is_read: false
        });
        await renderSaraView(container, info);
      };
      $('#staff-chat-send')?.addEventListener('click', sendStaffMsg);
      $('#staff-chat-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') sendStaffMsg(); });

      // Group chat
      const sendGroupMsg = async () => {
        const input = $('#group-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        await sb.from('chat_messages').insert({
          sender: 'sara', sender_name: 'Sara', message: text
        });
        await renderSaraView(container, info);
      };
      $('#group-send')?.addEventListener('click', sendGroupMsg);
      $('#group-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') sendGroupMsg(); });
    }

    // ============================================================
    // INIT
    // ============================================================
    async function init() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
      await checkSession();
      render();
    }

    init();
  })();
  </script>
</body>
</html>
